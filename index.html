<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Календарь мероприятий</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--gold:#c9a87c;
--gold2:#e2c49a;
--text:#efe5da;
--soft:rgba(239,229,218,0.7);

--green:#81c784;
--red:#ef9a9a;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Outfit',sans-serif;

background:
radial-gradient(circle at 20% 30%, rgba(201,168,124,0.08), transparent 30%),
radial-gradient(circle at 80% 70%, rgba(139,111,71,0.08), transparent 30%),
linear-gradient(180deg,#1a1410,#140f0c);

color:var(--text);
min-height:100vh;
overflow-x:hidden;
}

.container{
max-width:1200px;
margin:auto;
padding:24px 16px 40px;
}

.hero{
margin-bottom:30px;
}

.hero-title-shell{

max-width:700px;
margin:auto;

padding:26px 22px;
border-radius:26px;

text-align:center;

background:
linear-gradient(180deg,rgba(54,38,24,0.75),rgba(24,18,14,0.9)),
radial-gradient(circle at top,rgba(201,168,124,0.12),transparent);

border:1px solid rgba(201,168,124,0.15);

box-shadow:
0 18px 40px rgba(0,0,0,0.35),
inset 0 1px 0 rgba(255,255,255,0.03);

backdrop-filter:blur(14px);
}

.hero h1{
font-size:clamp(30px,5vw,44px);
font-weight:800;
letter-spacing:-0.03em;
color:var(--gold2);
}

.loading{
text-align:center;
padding:50px;
color:var(--gold);
font-size:16px;
}

.calendar-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:20px;
}

.event-card{

background:
linear-gradient(180deg,rgba(73,51,30,0.35),rgba(43,30,19,0.4));

border:1px solid rgba(201,168,124,0.18);

border-radius:20px;

padding:18px;

cursor:pointer;

transition:0.25s;

display:flex;
flex-direction:column;
justify-content:space-between;
}

.event-card:hover{
transform:translateY(-5px);
border-color:rgba(201,168,124,0.35);
box-shadow:0 18px 34px rgba(0,0,0,0.35);
}

.event-card-top{
display:flex;
justify-content:space-between;
margin-bottom:14px;
}

.event-date{
background:rgba(201,168,124,0.12);
color:var(--gold2);
padding:6px 12px;
border-radius:100px;
font-size:12px;
font-weight:700;
}

.resident{
background:rgba(201,168,124,0.08);
padding:6px 12px;
border-radius:100px;
font-size:11px;
border:1px solid rgba(201,168,124,0.2);
}

.event-name{
font-size:22px;
font-weight:800;
margin-bottom:14px;
}

.event-details{
display:flex;
flex-direction:column;
gap:8px;
color:var(--soft);
font-size:14px;
margin-bottom:12px;
}

.event-footer{
display:flex;
justify-content:space-between;
align-items:center;
border-top:1px solid rgba(201,168,124,0.1);
padding-top:12px;
}

.status{
font-size:12px;
padding:6px 12px;
border-radius:100px;
font-weight:700;
}

.status-open{
background:rgba(129,199,132,0.15);
color:var(--green);
}

.status-closed{
background:rgba(239,154,154,0.15);
color:var(--red);
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
z-index:1000;
align-items:center;
justify-content:center;
padding:20px;
}

.modal.active{
display:flex;
}

.modal-content{

background:
linear-gradient(180deg,rgba(74,51,30,0.4),rgba(38,26,17,0.85));

border-radius:24px;
border:1px solid rgba(201,168,124,0.2);

padding:26px;

width:100%;
max-width:520px;
max-height:90vh;

overflow-y:auto;
}

.modal-header{
font-size:28px;
font-weight:800;
color:var(--gold2);
margin-bottom:18px;
}

.modal-info{
margin-bottom:18px;
}

.modal-row{
display:flex;
gap:10px;
padding:10px 0;
border-bottom:1px solid rgba(201,168,124,0.08);
}

.modal-row strong{
min-width:90px;
color:var(--gold);
font-size:12px;
}

.modal-row span{
font-size:14px;
}

.input-group{
margin-bottom:16px;
}

.input-group label{
display:block;
font-size:12px;
color:var(--gold);
margin-bottom:6px;
}

.input-group input{

width:100%;

padding:12px 14px;

border-radius:12px;

border:1px solid rgba(201,168,124,0.18);

background:rgba(255,255,255,0.03);

color:var(--text);
}

.modal-buttons{
display:flex;
gap:10px;
}

.btn{

flex:1;

padding:14px;

border:none;

border-radius:12px;

font-weight:700;

cursor:pointer;
}

.btn-primary{
background:linear-gradient(135deg,var(--gold2),#ae8d66);
color:#1b140f;
}

.btn-secondary{
background:rgba(255,255,255,0.04);
color:white;
border:1px solid rgba(201,168,124,0.2);
}

</style>
</head>

<body>

<div class="container">

<div class="hero">
<div class="hero-title-shell">
<h1>Календарь игр</h1>
</div>
</div>

<div id="events-container">
<div class="loading">⏳ Загрузка мероприятий...</div>
</div>

</div>

<div id="modal" class="modal">
<div class="modal-content" id="modal-content"></div>
</div>

<script>

const API_BASE='https://delicate-wind-a87d.vanfossengame.workers.dev';

let tg=window.Telegram.WebApp;
tg.expand();
tg.ready();

let currentEvent=null;
let allEvents=[];

async function loadEvents(){

try{

const response=await fetch(API_BASE+'/events');
const data=await response.json();

if(data.success && data.events?.length>0){

allEvents=data.events;
displayEvents(allEvents);

}else{

document.getElementById('events-container').innerHTML=
'<div class="loading">Нет мероприятий</div>';

}

}catch(e){

document.getElementById('events-container').innerHTML=
'<div class="loading">Ошибка подключения</div>';

}

}

function displayEvents(events){

const container=document.getElementById('events-container');

container.innerHTML=
'<div class="calendar-grid">'+

events.map((event,index)=>{

const resident=event.residentStatus==='Резидентский';
const open=event.status==='Открытый';

return`

<div class="event-card" onclick="openModal(${index})">

<div>

<div class="event-card-top">

<div class="event-date">${event.date}</div>

${resident?'<div class="resident">🔒 Резиденты</div>':''}

</div>

<div class="event-name">${event.event}</div>

<div class="event-details">

<div>🕐 ${event.time}</div>

<div>📍 ${event.location}</div>

<div>💰 ${event.price}</div>

</div>

</div>

<div class="event-footer">

<span class="status ${open?'status-open':'status-closed'}">

${open?'Открыта запись':'Закрыта'}

</span>

<span style="color:var(--gold)">Подробнее</span>

</div>

</div>

`;

}).join('')+

'</div>';

}

function getTelegramSafeId(){

const user=tg.initDataUnsafe?.user;

if(!user)return'';

return user.username?'@'+user.username:'id'+user.id;

}

function openModal(index){

currentEvent=allEvents[index];

const modal=document.getElementById('modal');
const content=document.getElementById('modal-content');

const open=currentEvent.status==='Открытый';
const resident=currentEvent.residentStatus==='Резидентский';

content.innerHTML=`

<div class="modal-header">${currentEvent.event}</div>

<div class="modal-info">

<div class="modal-row"><strong>Дата</strong><span>${currentEvent.date}</span></div>
<div class="modal-row"><strong>Время</strong><span>${currentEvent.time}</span></div>
<div class="modal-row"><strong>Место</strong><span>${currentEvent.location}</span></div>
<div class="modal-row"><strong>Цена</strong><span>${currentEvent.price}</span></div>

</div>

<button class="btn btn-secondary" onclick="showParticipants()" style="width:100%;margin-bottom:16px;">
👥 Список участников
</button>

${open?`

<div class="input-group">
<label>Telegram</label>
<input id="telegram-input" value="${getTelegramSafeId()}">
</div>

${!resident?`
<div class="input-group">
<label>Игровой ник</label>
<input id="nickname-input">
</div>
`:''}

<div class="modal-buttons">

<button class="btn btn-secondary" onclick="closeModal()">Отмена</button>

<button class="btn btn-primary" onclick="register()">Записаться</button>

</div>

`:`

<div style="text-align:center;padding:20px;">
🔒 Регистрация закрыта
</div>

<button class="btn btn-secondary" onclick="closeModal()" style="width:100%;">
Закрыть
</button>

`}

`;

modal.classList.add('active');

}

function closeModal(){
document.getElementById('modal').classList.remove('active');
}

async function showParticipants(){

const content=document.getElementById('modal-content');

content.innerHTML='<div class="loading">Загрузка...</div>';

const url=new URL(API_BASE+'/participants');

url.searchParams.append('eventDate',currentEvent.dateShort);
url.searchParams.append('eventName',currentEvent.event);

const response=await fetch(url);
const data=await response.json();

if(data.success){

content.innerHTML=
'<div class="modal-header">Участники</div>'+
data.participants.map((p,i)=>
'<div>'+ (i+1)+'. '+p.nickname+'</div>'
).join('')+
'<button class="btn btn-secondary" onclick="openModal('+allEvents.indexOf(currentEvent)+')" style="margin-top:20px;width:100%;">Назад</button>';

}

}

async function register(){

const telegram=document.getElementById('telegram-input').value.trim();

let nickname='';
const nickInput=document.getElementById('nickname-input');

if(nickInput)nickname=nickInput.value.trim();

const url=new URL(API_BASE+'/register');

url.searchParams.append('eventDateTime',`${currentEvent.dateShort} ${currentEvent.time}`);
url.searchParams.append('event',currentEvent.event);
url.searchParams.append('telegram',telegram);
url.searchParams.append('nickname',nickname);
url.searchParams.append('location',currentEvent.location);
url.searchParams.append('residentStatus',currentEvent.residentStatus||'');

const response=await fetch(url);
const data=await response.json();

if(data.success){

document.getElementById('modal-content').innerHTML=
'<div style="text-align:center;padding:30px;">✓ Вы записаны!</div>'+
'<button class="btn btn-primary" onclick="closeModal()" style="width:100%;">Отлично</button>';

}else{

alert('Ошибка регистрации');

}

}

document.getElementById('modal').addEventListener('click',function(e){
if(e.target===this)closeModal();
});

loadEvents();

</script>

</body>
</html>
